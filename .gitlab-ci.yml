image: vladyslavusenko/basalt-ci:ubuntu22

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  CI_BASE_IMAGE: "vladyslavusenko/basalt-ci:ubuntu22"
  VCPKG_ROOT: "${CI_PROJECT_DIR}/thirdparty/vcpkg"
  VCPKG_DOWNLOADS: "${CI_PROJECT_DIR}/.cache/vcpkg/downloads"
  VCPKG_ARCHIVES: "${CI_PROJECT_DIR}/.cache/vcpkg/archives"
  VCPKG_BINARY_SOURCES: "clear;files,${VCPKG_ARCHIVES},readwrite"
  VCPKG_FEATURE_FLAGS: "binarycaching"
  LLVM_VERSION: "21"
  CC: "clang-${LLVM_VERSION}"
  CXX: "clang++-${LLVM_VERSION}"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"
  CCACHE_MAXSIZE: "2G"
  CCACHE_NOHASHDIR: "true"
  CCACHE_SLOPPINESS: "pch_defines,time_macros"

stages:
  - build
  - eval
  - results
  - release

.build_template: &build_template
  stage: build
  tags:
    - docker
  cache:
    - key: "${CI_RUNNER_EXECUTABLE_ARCH}-ccache"
      policy: pull-push
      paths:
        - .cache/ccache/
    - key: "${CI_RUNNER_EXECUTABLE_ARCH}-vcpkg-downloads"
      policy: pull-push
      paths:
        - .cache/vcpkg/downloads/
    - key: "${CI_RUNNER_EXECUTABLE_ARCH}-vcpkg-archives"
      policy: pull-push
      paths:
        - .cache/vcpkg/archives/
  before_script:
    - |
      case "$(uname -m)" in
        x86_64)
          export VCPKG_STATIC_TRIPLET=x64-linux
          export CXX_MARCH=x86-64-v3
          export ARCH=amd64
          ;;
        aarch64|arm64)
          export VCPKG_STATIC_TRIPLET=arm64-linux
          export CXX_MARCH=native
          export ARCH=arm64
          ;;
        *)
          echo "Unsupported CI architecture: $(uname -m)" >&2
          exit 1
          ;;
      esac
    - export PATH="/usr/bin:$PATH"
    - export CMAKE_MAKE_PROGRAM=/usr/bin/ninja
    - echo "Using static triplet ${VCPKG_STATIC_TRIPLET} with -march=${CXX_MARCH}"
    - which ninja
    - ninja --version
    - mkdir -p "${CI_PROJECT_DIR}/.cache/ccache" "${VCPKG_DOWNLOADS}" "${CI_PROJECT_DIR}/.cache/vcpkg/archives"
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
    - git config --global --add safe.directory "${VCPKG_ROOT}"
    - git config --global --add safe.directory "${VCPKG_DOWNLOADS}/git-tmp"
    - export CCACHE_BASEDIR=${PWD}
    - export CCACHE_DIR=${CI_PROJECT_DIR}/.cache/ccache
    - export CCACHE_COMPILERCHECK=content
    - ccache -z
    - |
      if git -C "${VCPKG_ROOT}" rev-parse --is-shallow-repository | grep -q true; then
        git -C "${VCPKG_ROOT}" fetch --unshallow
      fi
      if [ ! -x "${VCPKG_ROOT}/vcpkg" ]; then
        "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
      fi
    - ccache -s
  after_script:
    - ccache -s
  script:
    - cmake --version
    - |
      for PRESET in ${PRESETS}; do
        echo "Building preset: ${PRESET}"
        TARGET_TRIPLET="${VCPKG_STATIC_TRIPLET}"
        export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"
        for attempt in 1 2 3; do
          if cmake --preset ${PRESET} -DCMAKE_C_COMPILER=${CC} -DCMAKE_CXX_COMPILER=${CXX} -DCXX_MARCH=${CXX_MARCH} -DVCPKG_TARGET_TRIPLET=${TARGET_TRIPLET} -DCMAKE_MAKE_PROGRAM=/usr/bin/ninja -DBASALT_BUILD_SHARED_LIB=ON; then
            break
          fi
          if [ "${attempt}" -eq 3 ]; then
            exit 1
          fi
          sleep 10
        done
        cmake --build --preset ${PRESET} -j3
        ctest --preset ${PRESET}
        ./build/${PRESET}/basalt_calibrate --help
        ./build/${PRESET}/basalt_calibrate_imu --help
        ./build/${PRESET}/basalt_mapper --help
        ./build/${PRESET}/basalt_mapper_sim --help
        ./build/${PRESET}/basalt_mapper_sim_naive --help
        ./build/${PRESET}/basalt_opt_flow --help
        ./build/${PRESET}/basalt_vio --help
        ./build/${PRESET}/basalt_vio_sim --help
      done
    - |
      ARTIFACT_RELEASE_DIR="${CI_PROJECT_DIR}/artifacts/release/bin"
      mkdir -p "${ARTIFACT_RELEASE_DIR}"
      cp -a "${CI_PROJECT_DIR}/data" "${CI_PROJECT_DIR}/artifacts/release/data"
      RELEASE_BINS=(
        basalt_calibrate
        basalt_calibrate_imu
        basalt_kitti_eval
        basalt_mapper
        basalt_mapper_sim
        basalt_mapper_sim_naive
        basalt_opt_flow
        basalt_vio
        basalt_vio_sim
      )
      for bin in "${RELEASE_BINS[@]}"; do
        bin_path="${CI_PROJECT_DIR}/build/release/${bin}"
        test -x "${bin_path}"
        # Skip libbasalt.so check for static binaries
        if [[ "${bin}" != "basalt_kitti_eval" ]]; then
          ldd_output="$(ldd "${bin_path}" 2>&1 || true)"
          if ! echo "${ldd_output}" | grep -q "libbasalt\\.so"; then
            echo "Expected basalt shared library dependency not found: ${bin_path}" >&2
            echo "${ldd_output}" >&2
            exit 1
          fi
        fi
        install -m 0755 "${bin_path}" "${ARTIFACT_RELEASE_DIR}/${bin}"
      done
      # Copy shared library
      mkdir -p "${CI_PROJECT_DIR}/artifacts/release/lib"
      install -m 0755 "${CI_PROJECT_DIR}/build/release/libbasalt.so" "${CI_PROJECT_DIR}/artifacts/release/lib/"
      mkdir -p "${CI_PROJECT_DIR}/artifacts"
      # Use tag name for releases, commit SHA for regular builds
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        ARTIFACT_VERSION="${CI_COMMIT_TAG}"
      else
        ARTIFACT_VERSION="${CI_COMMIT_SHORT_SHA}"
      fi
      # Map ARCH (amd64/arm64) to standard triplet format
      case "${ARCH}" in
        amd64) ARCH_TRIPLET="x86_64" ;;
        arm64) ARCH_TRIPLET="aarch64" ;;
        *) ARCH_TRIPLET="${ARCH}" ;;
      esac
      # Use CI_SERVER_URL for GitLab instance URL, CI_PROJECT_PATH for project path
      GITLAB_BASE_URL="${CI_SERVER_URL}"
      PROJECT_PATH="${CI_PROJECT_PATH}"
      tar -C "${CI_PROJECT_DIR}/artifacts" -c -z -v -f "${CI_PROJECT_DIR}/artifacts/basalt-${ARTIFACT_VERSION}-${ARCH_TRIPLET}-unknown-linux-gnu.tar.gz" release
      bash "${CI_PROJECT_DIR}/scripts/generate_checksums.sh"

# Template for EuRoC evaluation
.eval_euroc_template: &eval_euroc_definition
  image: ubuntu:22.04
  stage: eval
  tags: [docker, dataset-eval]
  variables:
    GIT_STRATEGY: none
  needs:
    - job: ubuntu22-build
      artifacts: true
  artifacts:
    paths:
      - scripts/eval_full/eval_results/*
    expire_in: 1 week
  before_script:
    - bash scripts/install.sh --from-artifacts
    - . "${HOME}/.basalt/env"
  script:
    - cd scripts/eval_full
    - ./run_evaluations.sh

# Template for TUM-VI evaluation
.eval_tumvi_template: &eval_tumvi_definition
  image: ubuntu:22.04
  stage: eval

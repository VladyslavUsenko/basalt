# Template for KITTI evaluation
.eval_kitti_template: &eval_kitti_definition
  image: ubuntu:22.04
  stage: eval
  tags: [docker, dataset-eval]
  variables:
    GIT_STRATEGY: none
  needs:
    - job: ubuntu22-build
      artifacts: true
  artifacts:
    paths:
      - scripts/eval_full/eval_results_kitti/*
    expire_in: 1 week
  before_script:
    - bash scripts/install.sh --from-artifacts
    - . "${HOME}/.basalt/env"
  script:
    - cd scripts/eval_full
    - ./run_evaluations_kitti.sh

.eval_calib_template: &eval_calib_definition
  image: ubuntu:22.04
  stage: eval
  tags: [docker, dataset-eval]
  variables:
    GIT_STRATEGY: none
  needs:
    - job: ubuntu22-build
      artifacts: true
  artifacts:
    paths:
      - calib_eval_results/
    expire_in: 1 week
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3
    - bash scripts/install.sh --from-artifacts
    - . "${HOME}/.basalt/env"
  script:
    - bash scripts/eval_calib.sh

.eval_sim_template: &eval_sim_definition
  image: ubuntu:22.04
  stage: eval
  tags: [docker, dataset-eval]
  variables:
    GIT_STRATEGY: none
  needs:
    - job: ubuntu22-build
      artifacts: true
  artifacts:
    paths:
      - sim_eval_results/
    expire_in: 1 week
  before_script:
    - apt-get update -qq && apt-get install -y -qq python3
    - bash scripts/install.sh --from-artifacts
    - . "${HOME}/.basalt/env"
  script:
    - bash scripts/eval_sim.sh

# Template for release creation
.release_template: &release_definition
  image: ubuntu:22.04
  stage: release
  tags: [docker]
  variables:
    GIT_STRATEGY: none
  needs:
    - job: ubuntu22-build
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq
    - chmod +x scripts/*.sh
    - export GITLAB_URL="${CI_SERVER_URL}"
    - export PROJECT_PATH="${CI_PROJECT_PATH}"
  script:
    - bash scripts/create_gitlab_release.sh
  only:
    - tags
  when: manual

ubuntu22-build:
  <<: *build_template
  variables:
    PRESETS: "debug relwithdebinfo release"
  artifacts:
    when: on_success
    paths:
      - artifacts/basalt-*.tar.gz
      - artifacts/checksums.txt
      - artifacts/*.sha256
      - scripts/create_gitlab_release.sh
      - scripts/eval_full/
      - scripts/generate_checksums.sh
      - scripts/install.sh
      - scripts/eval_calib.sh
      - scripts/eval_sim.sh
      - scripts/check_calibration.py

pre-commit:
  image: python:3.10
  stage: build
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
    key: ${CI_JOB_NAME}
  before_script:
    - pip install pre-commit
  script:
    - pre-commit install
    - pre-commit run -a

# EuRoC evaluation jobs
eval_euroc:
  <<: *eval_euroc_definition
  when: manual
  allow_failure: false

# TUM-VI evaluation jobs
eval_tumvi:
  <<: *eval_tumvi_definition
  when: manual
  allow_failure: false

# KITTI evaluation jobs
eval_kitti:
  <<: *eval_kitti_definition
  when: manual
  allow_failure: false

eval_calib:
  <<: *eval_calib_definition
  when: manual
  allow_failure: false

eval_sim:
  <<: *eval_sim_definition
  when: manual
  allow_failure: false

# Release job
create_release:
  <<: *release_definition

# Results aggregation job
gen_results:
  stage: results
  variables:
    GIT_STRATEGY: none
  tags:
    - docker
  needs:
    - job: ubuntu22-build
      artifacts: true
    - job: eval_euroc
      artifacts: true
    - job: eval_tumvi
      artifacts: true
    - job: eval_kitti
      artifacts: true
  artifacts:
    paths:
      - euroc_results.txt
      - kitti_results.txt
      - tumvi_results.txt
  script:
    - cd scripts/eval_full
    - ./gen_results.py eval_results > euroc_results.txt
    - cat euroc_results.txt
    - ./gen_results_kitti.py eval_results_kitti > kitti_results.txt
    - cat kitti_results.txt
    - ./gen_results_tumvi.py eval_results_tumvi > tumvi_results.txt
    - cat tumvi_results.txt
    - mv euroc_results.txt ../../
    - mv kitti_results.txt ../../
    - mv tumvi_results.txt ../../
